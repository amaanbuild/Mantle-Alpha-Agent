# Render Blueprint: FREE single-service deploy (no credit card needed).
#
# Render dashboard: New, then Blueprint, then connect this repo, then Apply.
# After it deploys, fill the `sync: false` secret TELEGRAM_BOT_TOKEN in the UI.
#
# This runs the REST API + Telegram bot + Mantle monitor as ONE free web service
# (backend.run_all) using a self-contained SQLite database, so there is no
# separate database to provision. Render free web services sleep after ~15 min
# idle, so set up a free uptime pinger (UptimeRobot or cron-job.org) to GET
# <your-url>/health every 10 minutes. See docs/DEPLOY_RENDER.md for details.
#
# Note: the free instance disk is ephemeral, so SQLite data resets on redeploy.
# That is fine for a demo. For persistence, attach a managed Postgres and set
# DATABASE_URL to its connection string.

services:
  - type: web
    name: mantle-alpha-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.run_all:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin Python to 3.12 so every dependency installs from a prebuilt wheel.
      # (On 3.13/3.14, pydantic-core has no wheel and tries to compile from Rust,
      # which fails on Render's read-only build filesystem.)
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ENVIRONMENT
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false           # paste in the Render dashboard after first deploy
      - key: OPENAI_API_KEY
        sync: false           # optional; omit to use the rule-based parser
      - key: MANTLE_RPC_URL
        value: https://rpc.mantle.xyz
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./dev.db
